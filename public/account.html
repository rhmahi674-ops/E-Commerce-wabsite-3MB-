<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — NeonStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .tab-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .tracking-step.active .step-dot { background: #4f46e5; }
    .tracking-step.active .step-label { color: #1f2937; font-weight: 700; }
    .tracking-step.active .step-line { background: #4f46e5; }
    .step-dot { width: 1rem; height: 1rem; border-radius: 9999px; background: #e5e7eb; transition: all 0.3s; }
    .step-line { height: 3px; background: #e5e7eb; transition: all 0.3s; flex: 1; }
    .step-label { font-size: 0.65rem; color: #9ca3af; transition: all 0.3s; }
  </style>
</head>
<body class="min-h-screen bg-white text-gray-900">

  <!-- Navbar -->
  <nav class="border-b-2 border-gray-100">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <i class="fa-solid fa-store text-primary-600 text-xl"></i>
        <span class="text-xl font-black text-gray-900 tracking-tight">Neon<span class="text-primary-600">Store</span></span>
      </a>
      <div class="flex items-center gap-3">
        <a href="/" class="px-4 py-2 rounded-xl text-sm font-bold text-gray-500 hover:text-primary-600 transition-colors">
          <i class="fa-solid fa-store mr-1"></i> Shop
        </a>
        <button onclick="logout()" class="px-4 py-2 rounded-xl text-sm font-bold text-gray-500 hover:text-red-500 transition-colors">
          <i class="fa-solid fa-right-from-bracket mr-1"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-black mb-1">My Account</h1>
      <p class="text-gray-400 text-sm">Manage your profile and track your orders</p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-6 border-b-2 border-gray-100 mb-8">
      <button onclick="showTab('profile')" class="tab-btn active pb-4 text-sm font-bold border-b-2 border-transparent transition-colors" id="tab-profile">
        <i class="fa-solid fa-user mr-1.5"></i>Profile
      </button>
      <button onclick="showTab('orders')" class="tab-btn pb-4 text-sm font-bold text-gray-400 border-b-2 border-transparent transition-colors" id="tab-orders">
        <i class="fa-solid fa-receipt mr-1.5"></i>My Orders
      </button>
    </div>

    <!-- ========== PROFILE TAB ========== -->
    <div id="view-profile">
      <div class="max-w-lg">
        <div class="flex items-center gap-5 mb-8">
          <div class="w-16 h-16 rounded-2xl bg-primary-600 flex items-center justify-center text-white text-2xl font-black" id="avatarLetter">U</div>
          <div>
            <h2 class="text-xl font-black" id="profileName">Loading...</h2>
            <p class="text-gray-400 text-sm" id="profileEmail">Loading...</p>
          </div>
        </div>

        <div class="space-y-4">
          <div class="border-2 border-gray-100 rounded-2xl p-5">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Full Name</p>
            <p class="font-bold text-lg" id="infoName">—</p>
          </div>
          <div class="border-2 border-gray-100 rounded-2xl p-5">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Email Address</p>
            <p class="font-bold text-lg" id="infoEmail">—</p>
          </div>
          <div class="border-2 border-gray-100 rounded-2xl p-5">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Account Role</p>
            <p class="font-bold text-lg capitalize" id="infoRole">—</p>
          </div>
          <div class="border-2 border-gray-100 rounded-2xl p-5">
            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Member Since</p>
            <p class="font-bold text-lg" id="infoDate">—</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== ORDERS TAB ========== -->
    <div id="view-orders" class="hidden">
      <!-- Orders List -->
      <div id="ordersList" class="space-y-4"></div>
      <div id="ordersEmpty" class="text-center py-16 hidden">
        <i class="fa-solid fa-bag-shopping text-gray-200 text-5xl mb-4"></i>
        <p class="text-gray-400 font-bold text-lg mb-2">No orders yet</p>
        <p class="text-gray-300 text-sm mb-6">Start shopping to see your orders here</p>
        <a href="/" class="inline-block bg-primary-600 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-primary-700 transition-colors">
          <i class="fa-solid fa-arrow-right mr-2"></i>Start Shopping
        </a>
      </div>
      <div id="ordersLoading" class="text-center py-16">
        <i class="fa-solid fa-spinner fa-spin text-primary-500 text-3xl"></i>
        <p class="text-gray-400 mt-3 text-sm">Loading orders...</p>
      </div>
    </div>
  </div>

  <!-- Order Detail Modal -->
  <div id="orderModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" onclick="closeOrderModal()">
    <div class="bg-white rounded-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
      <div class="sticky top-0 bg-white p-6 pb-4 border-b-2 border-gray-100 flex items-center justify-between">
        <h2 class="text-xl font-black">Order Details</h2>
        <button onclick="closeOrderModal()" class="p-2 rounded-lg hover:bg-gray-100"><i class="fa-solid fa-xmark text-gray-500"></i></button>
      </div>
      <div id="orderDetailContent" class="p-6"></div>
    </div>
  </div>

  <script>
    // ========================
    // AUTH GUARD
    // ========================
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "null");
    if (!token || !user) {
      window.location.href = "/login.html?redirect=/account.html";
    }

    const headers = { "Authorization": "Bearer " + token, "Content-Type": "application/json" };

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/login.html";
    }

    function esc(str) { const d = document.createElement("div"); d.textContent = str || ""; return d.innerHTML; }

    // ========================
    // TABS
    // ========================
    function showTab(tab) {
      ["profile", "orders"].forEach(t => {
        document.getElementById("view-" + t).classList.toggle("hidden", t !== tab);
        const btn = document.getElementById("tab-" + t);
        if (t === tab) { btn.classList.add("active"); btn.classList.remove("text-gray-400"); }
        else { btn.classList.remove("active"); btn.classList.add("text-gray-400"); }
      });
    }

    // ========================
    // PROFILE
    // ========================
    async function loadProfile() {
      try {
        const res = await fetch("/api/auth/me", { headers });
        if (res.status === 401) { logout(); return; }
        const u = await res.json();
        document.getElementById("avatarLetter").textContent = (u.name || "U").charAt(0).toUpperCase();
        document.getElementById("profileName").textContent = u.name;
        document.getElementById("profileEmail").textContent = u.email;
        document.getElementById("infoName").textContent = u.name;
        document.getElementById("infoEmail").textContent = u.email;
        document.getElementById("infoRole").textContent = u.role;
        document.getElementById("infoDate").textContent = new Date(u.created_at).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
      } catch (err) { console.error(err); }
    }

    // ========================
    // ORDERS
    // ========================
    const statusSteps = ["Processing", "Confirmed", "Shipped", "Out for Delivery", "Delivered"];

    function statusBadge(status) {
      const colors = {
        "Processing": "bg-yellow-50 text-yellow-700 border-yellow-200",
        "Confirmed": "bg-blue-50 text-blue-700 border-blue-200",
        "Shipped": "bg-purple-50 text-purple-700 border-purple-200",
        "Out for Delivery": "bg-orange-50 text-orange-700 border-orange-200",
        "Delivered": "bg-green-50 text-green-700 border-green-200",
        "Cancelled": "bg-red-50 text-red-700 border-red-200",
      };
      return `<span class="inline-block px-2.5 py-1 rounded-lg text-xs font-bold border ${colors[status] || 'bg-gray-50 text-gray-600 border-gray-200'}">${esc(status)}</span>`;
    }

    function buildTrackingTimeline(currentStatus) {
      if (currentStatus === "Cancelled") {
        return `<div class="flex items-center gap-2 text-red-500"><i class="fa-solid fa-circle-xmark"></i><span class="text-sm font-bold">Order Cancelled</span></div>`;
      }
      const currentIdx = statusSteps.indexOf(currentStatus);
      return `
        <div class="flex items-center gap-1 w-full">
          ${statusSteps.map((step, i) => `
            <div class="tracking-step ${i <= currentIdx ? 'active' : ''} flex flex-col items-center flex-1">
              <div class="flex items-center w-full">
                ${i > 0 ? `<div class="step-line ${i <= currentIdx ? 'active' : ''}"></div>` : ''}
                <div class="step-dot flex-shrink-0 flex items-center justify-center">
                  ${i <= currentIdx ? '<i class="fa-solid fa-check text-white text-[7px]"></i>' : ''}
                </div>
                ${i < statusSteps.length - 1 ? '' : ''}
              </div>
              <p class="step-label mt-1.5 text-center whitespace-nowrap">${step}</p>
            </div>
          `).join("")}
        </div>
      `;
    }

    async function loadOrders() {
      try {
        const res = await fetch("/api/orders", { headers });
        if (res.status === 401) { logout(); return; }
        const orders = await res.json();

        document.getElementById("ordersLoading").classList.add("hidden");

        if (orders.length === 0) {
          document.getElementById("ordersEmpty").classList.remove("hidden");
          return;
        }

        document.getElementById("ordersList").innerHTML = orders.map(o => {
          const items = typeof o.items === "string" ? JSON.parse(o.items) : o.items;
          return `
            <div class="border-2 border-gray-100 rounded-2xl overflow-hidden hover:border-gray-200 transition-colors">
              <div class="p-5">
                <div class="flex items-center justify-between mb-4">
                  <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Order #${o.id}</p>
                    <p class="text-xs text-primary-600 font-bold mt-0.5">${esc(o.tracking_number || '')}</p>
                  </div>
                  <div class="text-right">
                    ${statusBadge(o.status)}
                    <p class="text-xs text-gray-400 mt-1">${new Date(o.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</p>
                  </div>
                </div>

                <!-- Tracking Timeline -->
                <div class="mb-5 px-2">
                  ${buildTrackingTimeline(o.status)}
                </div>

                <!-- Items Preview -->
                <div class="flex items-center gap-2 mb-3">
                  ${items.slice(0, 3).map(i =>
                    `<img src="${esc(i.image) || 'https://placehold.co/40x40/f1f5f9/94a3b8?text=...'}" class="w-10 h-10 rounded-lg object-cover border-2 border-gray-100" />`
                  ).join("")}
                  ${items.length > 3 ? `<span class="text-xs font-bold text-gray-400">+${items.length - 3} more</span>` : ''}
                </div>

                <div class="flex items-center justify-between">
                  <div>
                    <span class="text-sm text-gray-400">${items.length} item${items.length !== 1 ? 's' : ''}</span>
                    <span class="text-lg font-black ml-3">$${parseFloat(o.total).toFixed(2)}</span>
                  </div>
                  <button onclick="viewOrderDetail(${o.id})" class="px-4 py-2 rounded-xl text-xs font-bold text-primary-600 border-2 border-primary-200 hover:bg-primary-50 transition-colors">
                    View Details
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (err) {
        console.error(err);
        document.getElementById("ordersLoading").innerHTML = '<p class="text-red-400 text-sm">Failed to load orders</p>';
      }
    }

    async function viewOrderDetail(id) {
      try {
        const res = await fetch("/api/orders/" + id, { headers });
        const order = await res.json();
        const items = typeof order.items === "string" ? JSON.parse(order.items) : order.items;

        document.getElementById("orderDetailContent").innerHTML = `
          <div class="space-y-5">
            <!-- Tracking -->
            <div class="border-2 border-gray-100 rounded-xl p-4">
              <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Order Tracking</p>
              ${buildTrackingTimeline(order.status)}
            </div>

            <!-- Info -->
            <div class="flex items-center justify-between">
              <div>
                <p class="text-xs text-gray-400">Tracking Number</p>
                <p class="font-black text-primary-600">${esc(order.tracking_number || 'N/A')}</p>
              </div>
              <div class="text-right">
                <p class="text-xs text-gray-400">Status</p>
                ${statusBadge(order.status)}
              </div>
            </div>

            <!-- Items -->
            <div class="border-2 border-gray-100 rounded-xl p-4">
              <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Items Ordered</p>
              <div class="space-y-3">
                ${items.map(i => `
                  <div class="flex items-center gap-3">
                    <img src="${esc(i.image) || 'https://placehold.co/48x48/f1f5f9/94a3b8?text=...'}" class="w-12 h-12 rounded-xl object-cover" />
                    <div class="flex-1 min-w-0">
                      <p class="font-bold text-sm truncate">${esc(i.name)}</p>
                      <p class="text-xs text-gray-400">Qty: ${i.qty} × $${parseFloat(i.price).toFixed(2)}</p>
                    </div>
                    <p class="font-black text-sm">$${(i.price * i.qty).toFixed(2)}</p>
                  </div>
                `).join("")}
              </div>
              <div class="border-t-2 border-gray-100 mt-4 pt-4 flex justify-between">
                <span class="font-black">Total</span>
                <span class="font-black text-lg">$${parseFloat(order.total).toFixed(2)}</span>
              </div>
            </div>

            <!-- Shipping -->
            <div class="border-2 border-gray-100 rounded-xl p-4">
              <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Shipping Details</p>
              <div class="grid grid-cols-2 gap-3 text-sm">
                <div><p class="text-gray-400 text-xs">Name</p><p class="font-bold">${esc(order.full_name)}</p></div>
                <div><p class="text-gray-400 text-xs">Email</p><p class="font-bold">${esc(order.email)}</p></div>
                <div><p class="text-gray-400 text-xs">Phone</p><p class="font-bold">${esc(order.phone) || '—'}</p></div>
                <div><p class="text-gray-400 text-xs">City</p><p class="font-bold">${esc(order.city) || '—'}</p></div>
                <div class="col-span-2"><p class="text-gray-400 text-xs">Address</p><p class="font-bold">${esc(order.address)}</p></div>
              </div>
            </div>

            <p class="text-xs text-gray-400">Ordered on ${new Date(order.created_at).toLocaleString()}</p>
          </div>
        `;
        document.getElementById("orderModal").classList.remove("hidden");
      } catch (err) { console.error(err); }
    }

    function closeOrderModal() { document.getElementById("orderModal").classList.add("hidden"); }

    // ========================
    // INIT
    // ========================
    loadProfile();
    loadOrders();

    // Auto-switch to orders tab if coming from checkout
    if (new URLSearchParams(window.location.search).get("tab") === "orders") {
      showTab("orders");
    }
  </script>
</body>
</html>
