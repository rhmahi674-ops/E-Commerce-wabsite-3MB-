<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — NeonStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' }
          }
        }
      }
    }
  </script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-md mx-auto">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <i class="fa-solid fa-circle-check text-green-500 text-4xl"></i>
    </div>
    <h1 class="text-2xl font-black text-gray-900 mb-2">Payment Successful!</h1>
    <p class="text-gray-500 text-sm mb-6">Your payment has been processed successfully. Your order is now being prepared.</p>
    <div id="orderInfo" class="border-2 border-gray-100 rounded-xl p-4 mb-6 hidden">
      <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Order ID</p>
      <p id="orderId" class="text-lg font-black text-primary-600">#—</p>
    </div>
    <div class="flex flex-col sm:flex-row gap-3">
      <a href="/account.html" class="flex-1 bg-primary-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-primary-700 transition-colors text-center">
        <i class="fa-solid fa-box mr-2"></i>View My Orders
      </a>
      <a href="/" class="flex-1 border-2 border-gray-200 text-gray-600 py-3 rounded-xl font-bold text-sm hover:bg-gray-50 transition-colors text-center">
        <i class="fa-solid fa-store mr-2"></i>Continue Shopping
      </a>
    </div>
  </div>
  <script>
    // Clear cart after successful payment
    localStorage.removeItem("neon_cart");

    const params = new URLSearchParams(window.location.search);
    const orderId = params.get("order_id");
    if (orderId) {
      document.getElementById("orderInfo").classList.remove("hidden");
      document.getElementById("orderId").textContent = `#${orderId}`;
    }
  </script>
</body>
</html>
