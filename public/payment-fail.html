<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Failed — NeonStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' }
          }
        }
      }
    }
  </script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-md mx-auto">
    <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <i class="fa-solid fa-circle-xmark text-red-500 text-4xl"></i>
    </div>
    <h1 id="pageTitle" class="text-2xl font-black text-gray-900 mb-2">Payment Failed</h1>
    <p id="pageDesc" class="text-gray-500 text-sm mb-6">Your payment could not be processed. No amount has been charged. Please try again.</p>
    <div class="flex flex-col sm:flex-row gap-3">
      <a href="/" class="flex-1 bg-primary-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-primary-700 transition-colors text-center">
        <i class="fa-solid fa-rotate-left mr-2"></i>Try Again
      </a>
      <a href="/account.html" class="flex-1 border-2 border-gray-200 text-gray-600 py-3 rounded-xl font-bold text-sm hover:bg-gray-50 transition-colors text-center">
        <i class="fa-solid fa-box mr-2"></i>My Orders
      </a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("cancelled") === "1") {
      document.getElementById("pageTitle").textContent = "Payment Cancelled";
      document.getElementById("pageDesc").textContent = "You cancelled the payment. No amount has been charged. Your cart items are still saved.";
    }
  </script>
</body>
</html>
