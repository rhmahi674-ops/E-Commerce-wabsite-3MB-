<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6f8;
}

/* navbar */
.navbar{
  background:#1e1e2f;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* container */
.container{
  padding:20px;
}

/* order card */
.order-card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.status{
  display:inline-block;
  padding:5px 10px;
  border-radius:5px;
  background:orange;
  color:white;
  font-size:12px;
}

.delivered{
  background:green;
}

.price{
  color:#f85606;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
  🛒 My Orders
  <button onclick="goHome()">Home</button>
</div>

<div class="container" id="orderList">
  <!-- Orders will load here -->
</div>

<script>
// go home
function goHome(){
  window.location.href = "index.html";
}

// load orders from localStorage
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let html = "";

if(orders.length === 0){
  html = "<h3>No orders yet 😢</h3>";
}
else{

  orders.forEach((order, index) => {

    html += `
      <div class="order-card">

        <h3>Order #${index + 1}</h3>

        <p>Date: ${order.date}</p>

        <p class="price">
          Total Items: ${order.items.length}
        </p>

        <span class="status ${order.status === "Delivered" ? "delivered" : ""}">
          ${order.status}
        </span>

      </div>
    `;
  });

}

document.getElementById("orderList").innerHTML = html;

</script>

</body>
</html>
